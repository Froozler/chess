<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Chess</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root {
            --bg: #fdfdfd;
            --text: #1a1a1a;
            --accent: #ff4742;
            --accent-hover: #e03e39;
            --surface: #ffffff;
            --border: #eaeaea;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none; 
        }

        body.game-active {
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            text-align: center;
        }

        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .icon {
            width: 28px;
            height: 28px;
            fill: var(--text);
        }

        .status-badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #444;
            transition: all 0.3s ease;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(255, 71, 66, 0.39);
            display: none;
            margin: 0 auto 20px auto;
        }

        .btn:hover {
            transform: translateY(-2px);
            background-color: var(--accent-hover);
            box-shadow: 0 6px 20px 0 rgba(255, 71, 66, 0.5);
        }

        #board {
            width: 100%;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            border: 4px solid var(--border);
            touch-action: none; 
            cursor: pointer;
        }

        /* Tap to move styling */
        .highlight {
            background-color: rgba(255, 255, 51, 0.5) !important;
        }

        .highlight-legal {
            position: relative;
        }

        .highlight-legal::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 25%;
            height: 25%;
            background-color: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Replay Controls */
        .replay-controls {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-icon {
            background: #f0f0f0;
            color: #1a1a1a;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover { background: #e0e0e0; }
        .btn-icon:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-wrapper">
            <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.998 19.996V22H3.998V19.996H19.998ZM11.996 2.001C13.239 1.999 15.65 2.502 17.5 4.35C18.631 5.48 19.167 6.945 19.261 8.528L19.268 8.784L18.847 9.07C16.92 10.372 15.541 12.33 14.887 14.629L14.778 15.061L15.358 15.15C16.353 15.3 17.16 15.823 17.65 16.598L17.818 16.89L17.914 17.218L18.15 18.521L18.232 18.823L17.913 18.824H6.082L5.764 18.823L5.845 18.521L6.16 16.784C6.39 15.518 7.28 14.502 8.483 14.073L8.85 13.952L8.723 13.585C8.016 11.533 7.844 9.176 8.547 7.027L8.681 6.643L8.318 6.467C7.625 6.13 6.91 5.923 6.11 5.864C6.015 5.856 5.972 5.736 6.046 5.674C7.545 4.417 9.539 3.425 11.666 3.064L11.996 2.001Z"/>
            </svg>
            <h1>P2P Chess</h1>
        </div>
        
        <div class="status-badge" id="statusEl">Initializing...</div>
        <button class="btn" id="shareBtn">🔗 Copy Invite Link</button>

        <div id="board"></div>

        <div class="replay-controls" id="replayControls">
            <button class="btn-icon" id="prevBtn" onclick="stepReplay(-1)">◀</button>
            <span id="replayStepText" style="font-weight: 600; font-size: 15px;">Final</span>
            <button class="btn-icon" id="nextBtn" onclick="stepReplay(1)">▶</button>
        </div>
    </div>

    <div class="footer">Permanent Games • Tap to Move</div>

    <script>
        // --- 1. Init & Permanent Game Routing ---
        const urlParams = new URLSearchParams(window.location.search);
        let gameId = urlParams.get('game');

        if (!gameId) {
            gameId = 'chss_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem(gameId + '_role', 'host');
            window.location.href = '?game=' + gameId;
        }

        let myRole = localStorage.getItem(gameId + '_role');
        if (!myRole) {
            myRole = 'guest';
            localStorage.setItem(gameId + '_role', 'guest');
        }

        let myColor = myRole === 'host' ? 'w' : 'b';
        let game = new Chess();
        let board = null;
        let peer = null;
        let conn = null;

        const savedPgn = localStorage.getItem(gameId + '_pgn');
        if (savedPgn) game.load_pgn(savedPgn);

        let selectedSquare = null;
        let legalMoves = [];
        let replayMoves = [];
        let currentReplayStep = 0;

        const statusEl = document.getElementById('statusEl');
        const shareBtn = document.getElementById('shareBtn');
        
        const moveSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-self.mp3');
        const captureSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/capture.mp3');

        function playSound(moveData) {
            if (!moveData) return;
            if (moveData.captured) captureSound.play().catch(()=>{});
            else moveSound.play().catch(()=>{});
        }

        function saveState() {
            localStorage.setItem(gameId + '_pgn', game.pgn());
        }

        // --- 2. Network Logic ---
        if (myRole === 'host') {
            peer = new Peer(gameId);
            
            peer.on('open', () => {
                shareBtn.style.display = 'inline-block';
                statusEl.innerText = savedPgn ? "⏳ Waiting for opponent to return..." : "⏳ Waiting for opponent...";
                
                shareBtn.onclick = () => {
                    navigator.clipboard.writeText(window.location.href);
                    shareBtn.innerText = "✅ Copied to Clipboard!";
                    setTimeout(() => { shareBtn.innerText = "🔗 Copy Invite Link"; }, 2000);
                };
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupConnectionHandlers();
                conn.on('open', () => {
                    conn.send({ type: 'sync', pgn: game.pgn() });
                });
            });
        } else {
            peer = new Peer();
            peer.on('open', () => { connectToHost(); });
            peer.on('error', (err) => {
                if (err.type === 'peer-unavailable') {
                    statusEl.innerText = "⏳ Host is offline. Retrying...";
                    setTimeout(connectToHost, 3000);
                }
            });
        }

        function connectToHost() {
            statusEl.innerText = "🟡 Connecting to host...";
            conn = peer.connect(gameId, { reliable: true });
            setupConnectionHandlers();
        }

        function setupConnectionHandlers() {
            conn.on('open', () => {
                shareBtn.style.display = 'none';
                document.body.classList.add('game-active');
                updateGameStatus();
            });

            conn.on('data', (data) => {
                if (data.type === 'move') {
                    const moveResult = game.move(data.move);
                    board.position(game.fen());
                    playSound(moveResult);
                    saveState();
                    updateGameStatus();
                } else if (data.type === 'sync') {
                    game.load_pgn(data.pgn);
                    board.position(game.fen());
                    saveState();
                    updateGameStatus();
                }
            });

            conn.on('close', () => {
                statusEl.innerText = "❌ Opponent offline. Waiting...";
                document.body.classList.remove('game-active');
                if (myRole === 'guest') setTimeout(connectToHost, 3000);
            });
        }

        // --- 3. Chess Logic & UI ---
        function initBoard() {
            const config = {
                draggable: false, 
                position: game.fen(),
                orientation: myColor === 'w' ? 'white' : 'black',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            board = Chessboard('board', config);
            
            // If the game is already over on load, trigger the end UI immediately
            if (game.game_over()) {
                updateGameStatus();
            }

            $('#board').on('click', '.square-55d63', handleSquareClick);
        }

        function removeHighlights() {
            $('#board .square-55d63').removeClass('highlight highlight-legal');
        }

        function handleSquareClick() {
            if (game.game_over()) return;
            
            if (game.turn() !== myColor) return;
            
            // Require active connection to make a move
            if (!conn || !conn.open) {
                alert("Please wait for your opponent to connect.");
                return;
            }

            let square = $(this).attr('data-square');

            if (selectedSquare) {
                let move = legalMoves.find(m => m.to === square);
                
                if (move) {
                    let moveResult = game.move({
                        from: selectedSquare,
                        to: square,
                        promotion: 'q'
                    });
                    
                    playSound(moveResult);
                    board.position(game.fen());
                    conn.send({ type: 'move', move: moveResult });
                    saveState();
                    updateGameStatus();
                    
                    selectedSquare = null;
                    legalMoves = [];
                    removeHighlights();
                    return;
                }
            }

            let piece = game.get(square);
            if (piece && piece.color === myColor) {
                selectedSquare = square;
                legalMoves = game.moves({ square: square, verbose: true });
                
                removeHighlights();
                $(this).addClass('highlight');
                legalMoves.forEach(m => {
                    $('.square-' + m.to).addClass('highlight-legal');
                });
            } else {
                selectedSquare = null;
                legalMoves = [];
                removeHighlights();
            }
        }

        function updateGameStatus() {
            // Do not overwrite network connecting/waiting messages unless the game is over
            if (!conn || !conn.open) {
                if (!game.game_over()) return;
            }

            let status = '';
            let moveColor = game.turn() === 'w' ? 'White' : 'Black';

            if (game.in_checkmate()) {
                status = `🏆 Game Over! ${moveColor} is in checkmate.`;
                initReplay();
            } else if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) {
                status = '🤝 Game Drawn';
                initReplay();
            } else {
                status = `🟢 ${moveColor}'s Turn`;
                if (game.in_check()) status += ` (Check!)`;
            }
            statusEl.innerText = status;
        }

        // --- 4. Immortal Replay Logic ---
        function initReplay() {
            document.getElementById('replayControls').style.display = 'flex';
            document.getElementById('shareBtn').style.display = 'none';
            
            replayMoves = game.history();
            currentReplayStep = replayMoves.length;
            updateReplayUI();
        }

        window.stepReplay = function(direction) {
            currentReplayStep += direction;
            if (currentReplayStep < 0) currentReplayStep = 0;
            if (currentReplayStep > replayMoves.length) currentReplayStep = replayMoves.length;
            
            let tempGame = new Chess();
            for (let i = 0; i < currentReplayStep; i++) {
                tempGame.move(replayMoves[i]);
            }
            
            board.position(tempGame.fen());
            updateReplayUI();
        };

        function updateReplayUI() {
            document.getElementById('prevBtn').disabled = (currentReplayStep === 0);
            document.getElementById('nextBtn').disabled = (currentReplayStep === replayMoves.length);
            
            let txt = currentReplayStep === replayMoves.length ? "Final" : `Move ${currentReplayStep}`;
            document.getElementById('replayStepText').innerText = txt;
        }

        // Boot the board immediately on load for BOTH players
        initBoard();

    </script>
</body>
</html>
