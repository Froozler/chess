<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chess ♟️</title>
    
    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <!-- Levelsio Style CSS -->
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #1a1a1a;
            --accent: #ff4742;
            --accent-hover: #e03e39;
            --surface: #ffffff;
            --border: #eaeaea;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #666;
            margin: 0 0 25px 0;
            font-size: 15px;
        }

        .status-badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #444;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(255, 71, 66, 0.39);
            display: none; /* Hidden by default */
            margin: 0 auto 20px auto;
        }

        .btn:hover {
            transform: translateY(-2px);
            background-color: var(--accent-hover);
            box-shadow: 0 6px 20px 0 rgba(255, 71, 66, 0.5);
        }

        #board {
            width: 100%;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            border: 4px solid var(--border);
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>P2P Chess ♟️</h1>
        <p class="subtitle">No servers. Just WebRTC.</p>
        
        <div class="status-badge" id="statusEl">Initializing network...</div>
        
        <button class="btn" id="shareBtn">🔗 Copy Invite Link</button>

        <!-- The Chess Board -->
        <div id="board"></div>
    </div>

    <div class="footer">Built with PeerJS, Chess.js & Chessboard.js</div>

    <script>
        // --- 1. State Setup ---
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');
        
        let myColor = 'w';
        let game = new Chess();
        let board = null;
        let peer = new Peer(); // Auto-generates a unique ID
        let conn = null;

        const statusEl = document.getElementById('statusEl');
        const shareBtn = document.getElementById('shareBtn');

        // --- 2. Network Logic (PeerJS) ---
        peer.on('open', (id) => {
            if (joinId) {
                // We are Player 2 (Black) joining a host
                myColor = 'b';
                statusEl.innerText = "🟡 Connecting to host...";
                conn = peer.connect(joinId);
                setupConnectionHandlers();
            } else {
                // We are Player 1 (White) hosting the game
                statusEl.innerText = "⏳ Waiting for opponent...";
                shareBtn.style.display = 'inline-block';
                
                const inviteUrl = window.location.href.split('?')[0] + '?join=' + id;
                
                shareBtn.onclick = () => {
                    navigator.clipboard.writeText(inviteUrl);
                    shareBtn.innerText = "✅ Copied to Clipboard!";
                    setTimeout(() => { shareBtn.innerText = "🔗 Copy Invite Link"; }, 2000);
                };

                // Wait for Player 2 to connect
                peer.on('connection', (connection) => {
                    conn = connection;
                    setupConnectionHandlers();
                });
            }
        });

        function setupConnectionHandlers() {
            conn.on('open', () => {
                shareBtn.style.display = 'none';
                initBoard();
            });

            conn.on('data', (data) => {
                if (data.type === 'move') {
                    game.move(data.move);
                    board.position(game.fen());
                    updateGameStatus();
                }
            });

            conn.on('close', () => {
                statusEl.innerText = "❌ Opponent disconnected.";
            });
        }

        // --- 3. Chess Logic & UI ---
        function initBoard() {
            const config = {
                draggable: true,
                position: 'start',
                orientation: myColor === 'w' ? 'white' : 'black',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            };
            board = Chessboard('board', config);
            updateGameStatus();
        }

        function onDragStart(source, piece, position, orientation) {
            // Prevent dragging if game is over
            if (game.game_over()) return false;
            
            // Prevent dragging opponent's pieces
            if ((myColor === 'w' && piece.search(/^b/) !== -1) ||
                (myColor === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
            
            // Prevent dragging if it's not your turn
            if (game.turn() !== myColor) return false;
        }

        function onDrop(source, target) {
            // Validate move logic
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Simplification: auto-promote to Queen
            });

            // If illegal move, snap piece back
            if (move === null) return 'snapback';

            // Send valid move to opponent
            conn.send({ type: 'move', move: move });
            updateGameStatus();
        }

        function onSnapEnd() {
            // Update board position after castling, en passant, promotion
            board.position(game.fen());
        }

        function updateGameStatus() {
            let status = '';
            let moveColor = game.turn() === 'w' ? 'White' : 'Black';

            if (game.in_checkmate()) {
                status = `🏆 Game Over! ${moveColor} is in checkmate.`;
            } else if (game.in_draw()) {
                status = '🤝 Game Drawn';
            } else {
                status = `🟢 ${moveColor}'s Turn`;
                if (game.in_check()) {
                    status += ` (Check!)`;
                }
            }
            statusEl.innerText = status;
        }
    </script>
  <script>
    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js"); }
  </script>
</body>
</html>
